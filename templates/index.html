<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Plan — Gordoniz Servicios Inmobiliarios</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #222; }

  .header {
    background: #1A3C5E;
    color: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 1px; }
  .header span { font-size: 12px; color: #E8A020; font-weight: 600; letter-spacing: 2px; }

  .panel {
    background: white;
    padding: 24px 32px;
    border-bottom: 3px solid #E8A020;
    display: flex;
    gap: 12px;
    align-items: flex-end;
    flex-wrap: wrap;
  }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
  .field input {
    border: 1.5px solid #ccc;
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 14px;
    outline: none;
    transition: border 0.2s;
    background: #fafafa;
  }
  .field input:focus { border-color: #1A3C5E; background: white; }
  .field-address input { width: 360px; }
  .field-key input { width: 280px; font-family: monospace; font-size: 12px; }
  .field-radio input { width: 100px; }
  .btn {
    background: #E8A020;
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 28px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    height: 40px;
  }
  .btn:hover { background: #cf8c18; }
  .btn:disabled { background: #ccc; cursor: not-allowed; }
  .btn-export {
    background: #1A3C5E;
    margin-left: auto;
    display: none;
  }
  .btn-export:hover { background: #152f4a; }

  .status {
    text-align: center;
    padding: 20px;
    color: #666;
    font-size: 14px;
    display: none;
  }
  .status.visible { display: block; }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 3px solid #ddd;
    border-top-color: #E8A020;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #keyplan-container {
    padding: 32px;
    display: none;
  }
  #keyplan-container.visible { display: block; }

  .keyplan {
    background: white;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 32px 36px 24px;
    position: relative;
    min-height: 500px;
  }

  .kp-logo {
    position: absolute;
    top: 24px;
    left: 28px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  .kp-logo-icon {
    font-size: 28px;
    font-weight: 900;
    color: #1A3C5E;
    letter-spacing: -1px;
    line-height: 1;
  }
  .kp-logo-sub {
    font-size: 8px;
    color: #1A3C5E;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .kp-logo-sub span { color: #E8A020; }

  .kp-title {
    text-align: center;
    margin-bottom: 28px;
    padding-top: 4px;
  }
  .kp-title h2 {
    font-size: 14px;
    font-weight: 700;
    text-decoration: underline;
    color: #1A3C5E;
    letter-spacing: 2px;
    margin-bottom: 2px;
  }
  .kp-title p {
    font-size: 13px;
    color: #333;
    font-weight: 600;
  }
  .kp-meta {
    font-size: 10px;
    color: #999;
    margin-top: 4px;
    font-weight: 400;
  }

  .streets-wrapper {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 16px;
  }

  .street-block {
    display: flex;
    flex-direction: column;
    margin-bottom: 8px;
  }

  .places-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 8px 6px;
    min-height: 56px;
    align-items: flex-end;
  }
  .places-row.bottom {
    align-items: flex-start;
    padding: 6px 8px 10px;
  }

  .street-band {
    background: #6B6B6B;
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 20px;
    display: flex;
    align-items: center;
    border-radius: 2px;
  }

  .place-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
    width: 72px;
  }
  .place-chip:hover { transform: translateY(-2px); }
  .place-chip:hover .place-tooltip { display: block; }

  .place-logo-wrap {
    width: 64px;
    height: 36px;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #e0e0e0;
    background: white;
    position: relative;
  }
  .place-logo-wrap img {
    max-width: 58px;
    max-height: 32px;
    object-fit: contain;
  }
  .place-logo-wrap .fallback-text {
    width: 100%;
    height: 100%;
  }
  .place-name {
    font-size: 8px;
    text-align: center;
    color: #333;
    margin-top: 3px;
    width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 600;
    line-height: 1.2;
  }

  .place-chip.target .place-logo-wrap {
    border: 2.5px solid #E53935;
    box-shadow: 0 0 0 1px rgba(229,57,53,0.3);
    background: #FFF9C4;
  }
  .target-arrow {
    font-size: 20px;
    color: #E53935;
    text-align: center;
    display: block;
    margin-bottom: -2px;
  }

  .place-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: #1A3C5E;
    color: white;
    font-size: 10px;
    padding: 6px 10px;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    min-width: 140px;
    text-align: center;
  }
  .place-tooltip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #1A3C5E;
  }
  .tooltip-name { font-weight: 700; font-size: 11px; }
  .tooltip-cat { color: #E8A020; font-size: 9px; margin-top: 2px; }
  .tooltip-rating { margin-top: 2px; }
  .star { color: #E8A020; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid #eee;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: #555;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .stats-bar {
    display: flex;
    gap: 24px;
    margin-top: 12px;
    padding: 12px 0;
    border-top: 1px solid #eee;
    flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; color: #1A3C5E; }
  .stat-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }

  .cat-summary {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 16px;
  }
  .cat-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    color: white;
  }

  @media print {
    body { background: white; }
    .panel, .header, .btn-export, .status { display: none !important; }
    #keyplan-container { padding: 0; display: block !important; }
    .keyplan { box-shadow: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <div style="font-size:22px;font-weight:900;letter-spacing:-1px;">G</div>
  </div>
  <div>
    <h1>GORDONIZ</h1>
    <span>SERVICIOS INMOBILIARIOS</span>
  </div>
  <div style="margin-left:auto;font-size:13px;color:#aaa;">Key Plan Generator</div>
</div>

<div class="panel">
  <div class="field field-address">
    <label>Direcci&#243;n del local</label>
    <input type="text" id="address" placeholder="Ej: Calle Alcal&#225; 1, Madrid" value="">
  </div>
  <div class="field field-radio">
    <label>Radio (m)</label>
    <input type="number" id="radius" value="200" min="50" max="1000" step="50">
  </div>
  <div class="field field-key" id="apikey-group">
    <label>Google API Key</label>
    <input type="password" id="apikey" placeholder="AIza...">
  </div>
  <button class="btn" id="btn-generate" onclick="generate()">&#9658; Generar Key Plan</button>
  <button class="btn btn-export" id="btn-export" onclick="window.print()">&#8595; Exportar / Imprimir</button>
  <button class="btn" id="btn-map" onclick="toggleMap()" style="display:none;background:#2E7D32;">Ver Mapa</button>
</div>

<div class="status" id="status">
  <span class="spinner"></span> <span id="status-text">Buscando negocios...</span>
</div>

<div id="keyplan-container">
  <div class="keyplan" id="keyplan">
  </div>
</div>

<div id="map-container" style="display:none; padding: 16px 32px;">
  <div id="map" style="height:600px; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.15); border:2px solid #e0e0e0;"></div>
</div>

<script>
const LEGEND_CATS = {
  "Restauracion": "#E53935",
  "Comercio":     "#43A047",
  "Banca":        "#1E88E5",
  "Salud":        "#8E24AA",
  "Alojamiento":  "#FB8C00",
  "Transporte":   "#757575",
  "Educacion":    "#00ACC1",
  "Ocio":         "#F4511E",
  "Otros":        "#546E7A",
};

let lastData = null;
let serverHasKey = false;

(async () => {
  try {
    const cfg = await fetch('/api/config').then(r => r.json());
    serverHasKey = cfg.has_server_key;
    if (serverHasKey) {
      document.getElementById('apikey-group').style.display = 'none';
    } else {
      const saved = localStorage.getItem('gordoniz_api_key');
      if (saved) document.getElementById('apikey').value = saved;
    }
  } catch(e) {}
})();

async function generate() {
  const address = document.getElementById('address').value.trim();
  const radius  = parseInt(document.getElementById('radius').value) || 200;
  const apikey  = document.getElementById('apikey').value.trim();

  if (!address || (!apikey && !serverHasKey)) {
    alert('Introduce la direccion y la API Key.');
    return;
  }

  if (apikey) localStorage.setItem('gordoniz_api_key', apikey);

  const btn = document.getElementById('btn-generate');
  btn.disabled = true;
  btn.textContent = 'Cargando...';

  document.getElementById('status').classList.add('visible');
  document.getElementById('keyplan-container').classList.remove('visible');
  document.getElementById('btn-export').style.display = 'none';

  setStatus('Geocodificando direccion...');

  try {
    const resp = await fetch('/api/keyplan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ address, radius, api_key: apikey })
    });

    const data = await resp.json();

    if (!resp.ok || data.error) {
      throw new Error(data.error || 'Error desconocido');
    }

    setStatus('Encontrados ' + data.total + ' negocios. Generando Key Plan...');
    await sleep(300);

    lastData = data;
    renderKeyPlan(data);

  } catch (e) {
    setStatus('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generar Key Plan';
  }
}

function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function stars(rating) {
  if (!rating) return '';
  const full = Math.floor(rating);
  const half = rating - full >= 0.5 ? '1/2' : '';
  return '*'.repeat(full) + half + ' ' + rating.toFixed(1);
}

function renderKeyPlan(data) {
  const container = document.getElementById('keyplan');

  const parts = data.formatted_address.split(',');
  const streetPart = parts[0] ? parts[0].trim() : data.formatted_address;
  const cityPart   = parts.slice(-2).join(',').trim();

  const catCount = {};
  data.streets.forEach(function(s) {
    s.places.forEach(function(p) {
      catCount[p.category] = (catCount[p.category] || 0) + 1;
    });
  });

  let html = '<div class="kp-logo"><div class="kp-logo-icon">G</div>';
  html += '<div style="font-size:10px;font-weight:800;color:#1A3C5E;letter-spacing:1px;">GORDONIZ</div>';
  html += '<div class="kp-logo-sub">SERVICIOS <span>INMOBILIARIOS</span></div></div>';

  html += '<div class="kp-title"><h2>KEY PLAN</h2>';
  html += '<p>' + streetPart.toUpperCase() + '</p>';
  html += '<p style="font-weight:400;font-size:12px;">' + cityPart.toUpperCase() + '</p>';
  html += '<div class="kp-meta">Radio ' + data.radius + 'm &middot; ' + data.total + ' negocios encontrados</div></div>';

  html += '<div class="streets-wrapper">';

  data.streets.forEach(function(street) {
    const half   = Math.ceil(street.places.length / 2);
    const top    = street.places.slice(0, half);
    const bottom = street.places.slice(half);

    html += '<div class="street-block">';
    html += '<div class="places-row">';
    top.forEach(function(p) { html += placeChip(p); });
    html += '</div>';
    html += '<div class="street-band">' + street.name.toUpperCase() + '</div>';
    html += '<div class="places-row bottom">';
    bottom.forEach(function(p) { html += placeChip(p); });
    html += '</div>';
    html += '</div>';
  });

  html += '</div>';

  html += '<div class="stats-bar">';
  html += '<div class="stat"><div class="stat-num">' + data.total + '</div><div class="stat-label">Negocios</div></div>';
  html += '<div class="stat"><div class="stat-num">' + data.streets.length + '</div><div class="stat-label">Calles</div></div>';
  html += '<div class="stat"><div class="stat-num">' + data.radius + 'm</div><div class="stat-label">Radio</div></div>';
  html += '<div class="stat"><div class="stat-num">' + Object.keys(catCount).length + '</div><div class="stat-label">Categorias</div></div>';
  html += '</div>';

  html += '<div class="cat-summary">';
  Object.entries(catCount).sort(function(a,b){ return b[1]-a[1]; }).forEach(function(entry) {
    var cat = entry[0], n = entry[1];
    var color = LEGEND_CATS[cat] || '#546E7A';
    html += '<span class="cat-badge" style="background:' + color + '">' + cat + ' (' + n + ')</span>';
  });
  html += '</div>';

  html += '<div class="legend">';
  Object.entries(LEGEND_CATS).forEach(function(entry) {
    var cat = entry[0], color = entry[1];
    html += '<div class="legend-item"><div class="legend-dot" style="background:' + color + '"></div>' + cat + '</div>';
  });
  html += '</div>';

  container.innerHTML = html;

  container.querySelectorAll('.place-logo-wrap img').forEach(function(img) {
    img.onerror = function() {
      var wrap = this.closest('.place-logo-wrap');
      var color = wrap.dataset.color || '#546E7A';
      var name  = wrap.dataset.name || '';
      wrap.innerHTML = '<div class="fallback-text" style="background:' + color + '"></div>';
      var chip = wrap.closest('.place-chip');
      if (chip && !chip.querySelector('.place-name')) {
        var nameDiv = document.createElement('div');
        nameDiv.className = 'place-name';
        nameDiv.textContent = name;
        nameDiv.title = name;
        chip.appendChild(nameDiv);
      }
    };
  });

  document.getElementById('status').classList.remove('visible');
  document.getElementById('keyplan-container').classList.add('visible');
  document.getElementById('btn-export').style.display = 'inline-block';
  document.getElementById('btn-map').style.display = 'inline-block';
  document.getElementById('map-container').style.display = 'none';
  document.getElementById('btn-map').textContent = 'Ver Mapa';
  if (window._leafletMap) {
    window._leafletMap.remove();
    window._leafletMap = null;
  }
}

function placeChip(p) {
  var ratingStr = p.rating ? '<div class="tooltip-rating"><span class="star">*</span> ' + p.rating.toFixed(1) + ' (' + p.reviews + ')</div>' : '';
  var openStr = p.open === true ? '<div style="color:#4CAF50;margin-top:2px;">Abierto</div>'
              : p.open === false ? '<div style="color:#f44336;margin-top:2px;">Cerrado</div>' : '';

  return '<div class="place-chip">'
    + '<div class="place-logo-wrap" data-color="' + p.color + '" data-name="' + escHtml(p.name) + '">'
    + '<img src="' + p.logo + '" alt="' + escHtml(p.name) + '" loading="lazy">'
    + '</div>'
    + '<div class="place-name" title="' + escHtml(p.name) + '">' + escHtml(p.name) + '</div>'
    + '<div class="place-tooltip">'
    + '<div class="tooltip-name">' + escHtml(p.name) + '</div>'
    + '<div class="tooltip-cat">' + p.category + '</div>'
    + ratingStr + openStr
    + '</div>'
    + '</div>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleMap() {
  var mapDiv = document.getElementById('map-container');
  var btn = document.getElementById('btn-map');
  if (mapDiv.style.display === 'none') {
    mapDiv.style.display = 'block';
    btn.textContent = 'Cerrar Mapa';
    initMap(lastData);
  } else {
    mapDiv.style.display = 'none';
    btn.textContent = 'Ver Mapa';
    if (window._leafletMap) {
      window._leafletMap.remove();
      window._leafletMap = null;
    }
  }
}

function initMap(data) {
  if (!data) return;
  if (window._leafletMap) {
    window._leafletMap.remove();
    window._leafletMap = null;
  }

  var map = L.map('map', { zoomControl: true }).setView([data.lat, data.lng], 18);
  window._leafletMap = map;

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO',
    subdomains: 'abcd',
    maxZoom: 21
  }).addTo(map);

  L.circle([data.lat, data.lng], {
    radius: data.radius,
    color: '#1A3C5E',
    fillColor: '#1A3C5E',
    fillOpacity: 0.06,
    weight: 2,
    dashArray: '8,5'
  }).addTo(map);

  var pinHtml = '<div style="display:flex;flex-direction:column;align-items:center;filter:drop-shadow(0 3px 6px rgba(0,0,0,0.4));">'
    + '<div style="background:#E8A020;color:white;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:800;white-space:nowrap;border:2px solid white;">LOCAL</div>'
    + '<div style="width:2px;height:10px;background:#E8A020;"></div></div>';

  L.marker([data.lat, data.lng], {
    icon: L.divIcon({ className:'', html: pinHtml, iconAnchor:[30,0] }),
    zIndexOffset: 1000
  }).addTo(map).bindPopup('<b style="font-size:13px">Local buscado</b><br><span style="color:#666">' + data.formatted_address + '</span>');

  data.streets.forEach(function(street) {
    street.places.forEach(function(p) {
      if (!p.lat || !p.lng) return;

      var displayName = p.name.length > 22 ? p.name.slice(0, 21) + '...' : p.name;
      var initial = p.name.charAt(0).toUpperCase();
      var markerId = 'mk_' + Math.random().toString(36).slice(2);

      var labelHtml = '<div style="display:inline-flex;align-items:center;gap:7px;background:white;border:2.5px solid ' + p.color + ';padding:4px 10px 4px 4px;border-radius:24px;font-size:12px;font-weight:700;white-space:nowrap;box-shadow:0 2px 12px rgba(0,0,0,0.22);cursor:pointer;font-family:Arial,sans-serif;line-height:1;color:#222;">'
        + '<div id="' + markerId + '" style="width:28px;height:28px;border-radius:50%;background:' + p.color + ';flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:13px;font-weight:800;color:white;">' + initial + '</div>'
        + '<span>' + displayName + '</span></div>';

      var ratingHtml = p.rating ? '<div style="margin-top:4px;font-size:11px;color:#555">* ' + p.rating.toFixed(1) + ' (' + p.reviews + ' resenas)</div>' : '';
      var openHtml = p.open === true
        ? '<div style="margin-top:3px;font-size:11px;color:#4CAF50;font-weight:600">Abierto ahora</div>'
        : p.open === false
        ? '<div style="margin-top:3px;font-size:11px;color:#f44336;font-weight:600">Cerrado</div>' : '';

      var mkr = L.marker([p.lat, p.lng], {
        icon: L.divIcon({ className:'', html: labelHtml, iconAnchor:[0,14] })
      }).addTo(map);

      var logoImg = new Image();
      logoImg.onload = function() {
        if (logoImg.naturalWidth <= 16) return;
        var el = document.getElementById(markerId);
        if (el) {
          el.innerHTML = '';
          el.style.background = 'white';
          el.style.padding = '2px';
          var img = document.createElement('img');
          img.src = p.logo;
          img.style.cssText = 'width:24px;height:24px;object-fit:contain;border-radius:4px;';
          el.appendChild(img);
        }
      };
      logoImg.src = p.logo;

      mkr.bindPopup('<div style="min-width:180px;padding:2px">'
        + '<div style="display:inline-block;background:' + p.color + ';color:white;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;margin-bottom:6px;">' + p.category + '</div>'
        + '<div style="font-weight:700;font-size:14px;margin-bottom:2px;color:#222">' + p.name + '</div>'
        + '<div style="font-size:11px;color:#777">' + p.vicinity + '</div>'
        + ratingHtml + openHtml + '</div>', { maxWidth: 220 });
    });
  });
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
