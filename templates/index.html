<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Plan - Gordoniz Servicios Inmobiliarios</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef0f3; color: #222; }

.panel {
  background: white; padding: 16px 28px;
  border-bottom: 3px solid #E8A020;
  display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap;
}
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
.field input {
  border: 1.5px solid #ccc; border-radius: 5px;
  padding: 8px 12px; font-size: 13px; outline: none; background: #fafafa;
}
.field input:focus { border-color: #1A3C5E; background: white; }
.field-address input { width: 340px; }
.field-radio input { width: 80px; }
.field-key input { width: 260px; font-family: monospace; font-size: 11px; }
.btn {
  background: #E8A020; color: white; border: none; border-radius: 5px;
  padding: 9px 22px; font-size: 13px; font-weight: 700; cursor: pointer;
  height: 38px; white-space: nowrap; transition: background 0.2s;
}
.btn:hover { background: #cf8c18; }
.btn:disabled { background: #bbb; cursor: not-allowed; }
.btn-dark { background: #1A3C5E; }
.btn-dark:hover { background: #142e49; }
.btn-green { background: #2E7D32; }
.btn-green:hover { background: #1b5e20; }

.status { text-align: center; padding: 24px; color: #666; font-size: 14px; display: none; }
.status.visible { display: block; }
.spinner {
  display: inline-block; width: 18px; height: 18px;
  border: 3px solid #ddd; border-top-color: #E8A020;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  margin-right: 8px; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

#keyplan-container { padding: 28px 32px; display: none; }
#keyplan-container.visible { display: block; }

.keyplan {
  background: white; border-radius: 8px;
  box-shadow: 0 4px 28px rgba(0,0,0,0.10);
  padding: 28px 36px 36px; max-width: 1280px; margin: 0 auto;
}

.kp-header {
  display: flex; align-items: flex-start;
  margin-bottom: 24px; position: relative; min-height: 60px;
}
.kp-brand { display: flex; align-items: center; gap: 10px; flex-shrink: 0; z-index: 1; }
.kp-brand-texts { line-height: 1.25; }
.kp-brand-name { font-size: 16px; font-weight: 900; color: #1A3C5E; letter-spacing: 1.5px; }
.kp-brand-sub { font-size: 7.5px; color: #444; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 1px; }
.kp-brand-sub b { color: #E8A020; }

.kp-title { position: absolute; left: 50%; top: 0; transform: translateX(-50%); text-align: center; white-space: nowrap; }
.kp-title-label { font-size: 15px; font-weight: 700; text-decoration: underline; letter-spacing: 3px; color: #111; }
.kp-title-street { font-size: 13px; font-weight: 600; color: #222; margin-top: 3px; }
.kp-title-city { font-size: 11px; color: #555; margin-top: 1px; }

.kp-street-block { margin-bottom: 4px; }

.kp-logos-row {
  display: flex; flex-wrap: wrap; align-items: flex-end;
  gap: 12px 16px; padding: 16px 4px 10px; min-height: 96px;
}
.kp-logos-row.bottom { align-items: flex-start; padding: 10px 4px 16px; }

.kp-logo { height: 56px; max-width: 150px; object-fit: contain; display: block; flex-shrink: 0; }

.kp-logo-text {
  height: 56px; max-width: 100px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: #333; text-align: center;
  word-break: break-word; line-height: 1.3;
  border: 1px solid #ddd; border-radius: 4px; padding: 4px; background: #fafafa;
}

.kp-street-band {
  background: #6B6B6B; color: white; padding: 10px 20px;
  font-size: 18px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase;
}

.kp-target { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.kp-target-arrow {
  width: 0; height: 0;
  border-left: 20px solid transparent; border-right: 20px solid transparent;
  border-top: 28px solid #E53935; margin-bottom: 4px;
}
.kp-target-box { width: 86px; height: 56px; border: 3px solid #E53935; background: rgba(229,57,53,0.04); }

#map-container { padding: 16px 32px; display: none; }
#map { height: 580px; border-radius: 10px; border: 2px solid #ddd; }

@media print {
  body { background: white; }
  .panel, .status { display: none !important; }
  #keyplan-container { padding: 0; display: block !important; }
  .keyplan { box-shadow: none; border-radius: 0; max-width: 100%; padding: 16px 20px; }
  @page { size: A4 landscape; margin: 1cm; }
}
</style>
</head>
<body>

<div class="panel">
  <div style="display:flex;align-items:center;gap:9px;margin-right:6px;">
    <svg width="36" height="36" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
      <polygon points="20,3 38,13 38,27 20,37 2,27 2,13" fill="#e8f0f8"/>
      <polygon points="20,3 38,13 20,23 2,13" fill="#2E6B9E"/>
      <polygon points="2,13 20,23 20,37 2,27" fill="#1A3C5E"/>
      <polygon points="38,13 20,23 20,37 38,27" fill="#3A8FCC"/>
    </svg>
    <div>
      <div style="font-size:13px;font-weight:900;color:#1A3C5E;letter-spacing:1px;">GORDONIZ</div>
      <div style="font-size:7px;color:#E8A020;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;">Servicios Inmobiliarios</div>
    </div>
  </div>
  <div class="field field-address">
    <label>Direccion del local</label>
    <input type="text" id="address" placeholder="Ej: Calle Alcala 1, Madrid">
  </div>
  <div class="field field-radio">
    <label>Radio (m)</label>
    <input type="number" id="radius" value="200" min="50" max="1000" step="50">
  </div>
  <div class="field field-key" id="apikey-group">
    <label>Google API Key</label>
    <input type="password" id="apikey" placeholder="AIza...">
  </div>
  <button class="btn" id="btn-generate" onclick="generate()">Generar Key Plan</button>
  <button class="btn btn-dark" id="btn-export" onclick="window.print()" style="display:none;">Exportar / Imprimir</button>
  <button class="btn btn-green" id="btn-map" onclick="toggleMap()" style="display:none;">Ver Mapa</button>
</div>

<div class="status" id="status">
  <span class="spinner"></span><span id="status-text">Buscando negocios...</span>
</div>

<div id="keyplan-container">
  <div class="keyplan" id="keyplan"></div>
</div>

<div id="map-container">
  <div id="map"></div>
</div>

<script>
var lastData = null;
var serverHasKey = false;

(async function() {
  try {
    var cfg = await fetch('/api/config').then(function(r){ return r.json(); });
    serverHasKey = cfg.has_server_key;
    if (serverHasKey) {
      document.getElementById('apikey-group').style.display = 'none';
    } else {
      var saved = localStorage.getItem('gordoniz_api_key');
      if (saved) document.getElementById('apikey').value = saved;
    }
  } catch(e) {}
})();

async function generate() {
  var address = document.getElementById('address').value.trim();
  var radius  = parseInt(document.getElementById('radius').value) || 200;
  var apikey  = document.getElementById('apikey').value.trim();
  if (!address || (!apikey && !serverHasKey)) { alert('Introduce la direccion.'); return; }
  if (apikey) localStorage.setItem('gordoniz_api_key', apikey);
  var btn = document.getElementById('btn-generate');
  btn.disabled = true; btn.textContent = 'Cargando...';
  document.getElementById('status').classList.add('visible');
  document.getElementById('keyplan-container').classList.remove('visible');
  document.getElementById('btn-export').style.display = 'none';
  document.getElementById('btn-map').style.display = 'none';
  setStatus('Geocodificando direccion...');
  try {
    var resp = await fetch('/api/keyplan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ address: address, radius: radius, api_key: apikey })
    });
    var data = await resp.json();
    if (!resp.ok || data.error) throw new Error(data.error || 'Error');
    setStatus('Generando Key Plan...');
    await sleep(200);
    lastData = data;
    renderKeyPlan(data);
  } catch(e) {
    setStatus('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generar Key Plan';
  }
}

function setStatus(msg) { document.getElementById('status-text').textContent = msg; }
function sleep(ms) { return new Promise(function(r){ setTimeout(r, ms); }); }
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function onLogoError(img) {
  var src = img.src || '';
  if (src.indexOf('clearbit.com') !== -1) {
    var domain = src.replace('https://logo.clearbit.com/', '');
    img.onerror = function() { replaceFallback(img); };
    img.src = 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=128';
    img.style.height = '36px';
    img.style.maxWidth = '36px';
  } else {
    replaceFallback(img);
  }
}

function replaceFallback(img) {
  var alt = img.alt || '';
  if (alt && img.parentNode) {
    var div = document.createElement('div');
    div.className = 'kp-logo-text';
    div.textContent = alt.length > 16 ? alt.slice(0,14) + '..' : alt;
    div.title = alt;
    img.parentNode.replaceChild(div, img);
  } else if (img.parentNode) {
    img.parentNode.removeChild(img);
  }
}

var GORDONIZ_SVG = '<svg width="52" height="52" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">'
  + '<polygon points="20,3 38,13 38,27 20,37 2,27 2,13" fill="#e8f0f8"/>'
  + '<polygon points="20,3 38,13 20,23 2,13" fill="#2E6B9E"/>'
  + '<polygon points="2,13 20,23 20,37 2,27" fill="#1A3C5E"/>'
  + '<polygon points="38,13 20,23 20,37 38,27" fill="#3A8FCC"/>'
  + '</svg>';

function renderKeyPlan(data) {
  var container = document.getElementById('keyplan');
  var parts = data.formatted_address.split(',');
  var streetPart = (parts[0] || '').trim().toUpperCase();
  var cityPart = parts.slice(-2).join(',').trim().toUpperCase();

  var html = '<div class="kp-header">'
    + '<div class="kp-brand">' + GORDONIZ_SVG
    + '<div class="kp-brand-texts">'
    + '<div class="kp-brand-name">GORDONIZ</div>'
    + '<div class="kp-brand-sub">SERVICIOS <b>INMOBILIARIOS</b></div>'
    + '</div></div>'
    + '<div class="kp-title">'
    + '<div class="kp-title-label">KEY PLAN</div>'
    + '<div class="kp-title-street">' + escHtml(streetPart) + '</div>'
    + '<div class="kp-title-city">' + escHtml(cityPart) + '</div>'
    + '</div></div>';

  data.streets.forEach(function(street, si) {
    var half = Math.ceil(street.places.length / 2);
    var top = street.places.slice(0, half);
    var bottom = street.places.slice(half);

    html += '<div class="kp-street-block"><div class="kp-logos-row">';
    if (si === 0) {
      html += '<div class="kp-target"><div class="kp-target-arrow"></div><div class="kp-target-box"></div></div>';
    }
    top.forEach(function(p) {
      html += '<img class="kp-logo" src="' + escHtml(p.logo) + '" alt="' + escHtml(p.name)
        + '" title="' + escHtml(p.name) + '" onerror="onLogoError(this)">';
    });
    html += '</div>';
    html += '<div class="kp-street-band">' + escHtml(street.name.toUpperCase()) + '</div>';
    html += '<div class="kp-logos-row bottom">';
    bottom.forEach(function(p) {
      html += '<img class="kp-logo" src="' + escHtml(p.logo) + '" alt="' + escHtml(p.name)
        + '" title="' + escHtml(p.name) + '" onerror="onLogoError(this)">';
    });
    html += '</div></div>';
  });

  container.innerHTML = html;
  document.getElementById('status').classList.remove('visible');
  document.getElementById('keyplan-container').classList.add('visible');
  document.getElementById('btn-export').style.display = 'inline-block';
  document.getElementById('btn-map').style.display = 'inline-block';
  document.getElementById('map-container').style.display = 'none';
  if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
}

function toggleMap() {
  var mapDiv = document.getElementById('map-container');
  var btn = document.getElementById('btn-map');
  if (mapDiv.style.display === 'none' || !mapDiv.style.display) {
    mapDiv.style.display = 'block'; btn.textContent = 'X Cerrar Mapa'; initMap(lastData);
  } else {
    mapDiv.style.display = 'none'; btn.textContent = 'Ver Mapa';
    if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
  }
}

function initMap(data) {
  if (!data) return;
  if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
  var map = L.map('map').setView([data.lat, data.lng], 17);
  window._leafletMap = map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 21
  }).addTo(map);
  L.circle([data.lat, data.lng], {
    radius: data.radius, color: '#1A3C5E', fillColor: '#1A3C5E', fillOpacity: 0.06, weight: 2
  }).addTo(map);
  var pinHtml = '<div style="background:#E8A020;color:white;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:800;border:2px solid white;">LOCAL</div>';
  L.marker([data.lat, data.lng], {
    icon: L.divIcon({ className:'', html: pinHtml, iconAnchor:[30,0] }), zIndexOffset: 1000
  }).addTo(map).bindPopup('<b>' + escHtml(data.formatted_address) + '</b>');
  data.streets.forEach(function(street) {
    street.places.forEach(function(p) {
      if (!p.lat || !p.lng) return;
      var name = p.name.length > 20 ? p.name.slice(0,19) + '..' : p.name;
      var h = '<div style="background:white;border:2px solid ' + p.color + ';padding:3px 8px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,0.2);">' + escHtml(name) + '</div>';
      L.marker([p.lat, p.lng], { icon: L.divIcon({ className:'', html: h, iconAnchor:[0,12] }) })
        .addTo(map).bindPopup('<b>' + escHtml(p.name) + '</b><br><small>' + escHtml(p.vicinity) + '</small>');
    });
  });
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') generate(); });
</script>
</body>
</html>
