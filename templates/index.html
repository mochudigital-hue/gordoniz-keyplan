<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Plan - Gordoniz Servicios Inmobiliarios</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef0f3; }

.panel {
  background: white; padding: 14px 24px;
  border-bottom: 3px solid #E8A020;
  display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
}
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 10px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
.field input { border: 1.5px solid #ccc; border-radius: 5px; padding: 8px 12px; font-size: 13px; outline: none; background: #fafafa; }
.field input:focus { border-color: #1A3C5E; background: white; }
.field-address input { width: 340px; }
.field-radio input { width: 80px; }
.field-key input { width: 260px; font-family: monospace; font-size: 11px; }
.btn { background: #E8A020; color: white; border: none; border-radius: 5px; padding: 9px 22px; font-size: 13px; font-weight: 700; cursor: pointer; height: 38px; white-space: nowrap; transition: background 0.2s; }
.btn:hover { background: #cf8c18; }
.btn:disabled { background: #bbb; cursor: not-allowed; }
.btn-dark { background: #1A3C5E; }
.btn-dark:hover { background: #142e49; }
.btn-green { background: #2E7D32; }
.btn-green:hover { background: #1b5e20; }

.status { text-align: center; padding: 24px; color: #666; font-size: 14px; display: none; }
.status.visible { display: block; }
.spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #ddd; border-top-color: #E8A020; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

#keyplan-container { padding: 24px 28px; display: none; }
#keyplan-container.visible { display: block; }
.keyplan { background: white; border-radius: 8px; box-shadow: 0 4px 28px rgba(0,0,0,0.10); overflow: hidden; max-width: 1200px; margin: 0 auto; }
.keyplan svg { display: block; }

#map-container { padding: 16px 28px; display: none; }
#map { height: 560px; border-radius: 10px; border: 2px solid #ddd; }

@media print {
  body { background: white; }
  .panel, .status, #map-container { display: none !important; }
  #keyplan-container { padding: 0 !important; display: block !important; }
  .keyplan { box-shadow: none; border-radius: 0; }
  @page { size: A4 landscape; margin: 0.8cm; }
}
</style>
</head>
<body>

<div class="panel">
  <div style="display:flex;align-items:center;gap:9px;margin-right:6px;">
    <svg width="36" height="36" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
      <polygon points="22,3 41,13 41,28 22,38 3,28 3,13" fill="#e8f0f8"/>
      <polygon points="22,3 41,13 22,23 3,13" fill="#2E6B9E"/>
      <polygon points="3,13 22,23 22,38 3,28" fill="#1A3C5E"/>
      <polygon points="41,13 22,23 22,38 41,28" fill="#3A8FCC"/>
    </svg>
    <div>
      <div style="font-size:13px;font-weight:900;color:#1A3C5E;letter-spacing:1px;">GORDONIZ</div>
      <div style="font-size:7px;color:#E8A020;letter-spacing:1.5px;font-weight:700;text-transform:uppercase;">Servicios Inmobiliarios</div>
    </div>
  </div>
  <div class="field field-address">
    <label>Direccion del local</label>
    <input type="text" id="address" placeholder="Ej: Calle Alcala 1, Madrid">
  </div>
  <div class="field field-radio">
    <label>Radio (m)</label>
    <input type="number" id="radius" value="200" min="50" max="1000" step="50">
  </div>
  <div class="field field-key" id="apikey-group">
    <label>Google API Key</label>
    <input type="password" id="apikey" placeholder="AIza...">
  </div>
  <button class="btn" id="btn-generate" onclick="generate()">Generar Key Plan</button>
  <button class="btn btn-dark" id="btn-export" onclick="window.print()" style="display:none;">Exportar / Imprimir</button>
  <button class="btn btn-green" id="btn-map" onclick="toggleMap()" style="display:none;">Ver Mapa</button>
</div>

<div class="status" id="status">
  <span class="spinner"></span><span id="status-text">Buscando negocios...</span>
</div>

<div id="keyplan-container">
  <div class="keyplan" id="keyplan"></div>
</div>

<div id="map-container">
  <div id="map"></div>
</div>

<script>
var lastData = null;
var serverHasKey = false;

(async function() {
  try {
    var cfg = await fetch('/api/config').then(function(r){ return r.json(); });
    serverHasKey = cfg.has_server_key;
    if (serverHasKey) {
      document.getElementById('apikey-group').style.display = 'none';
    } else {
      var saved = localStorage.getItem('gordoniz_api_key');
      if (saved) document.getElementById('apikey').value = saved;
    }
  } catch(e) {}
})();

async function generate() {
  var address = document.getElementById('address').value.trim();
  var radius  = parseInt(document.getElementById('radius').value) || 200;
  var apikey  = document.getElementById('apikey').value.trim();
  if (!address || (!apikey && !serverHasKey)) { alert('Introduce la direccion.'); return; }
  if (apikey) localStorage.setItem('gordoniz_api_key', apikey);
  var btn = document.getElementById('btn-generate');
  btn.disabled = true; btn.textContent = 'Cargando...';
  document.getElementById('status').classList.add('visible');
  document.getElementById('keyplan-container').classList.remove('visible');
  document.getElementById('btn-export').style.display = 'none';
  document.getElementById('btn-map').style.display = 'none';
  setStatus('Geocodificando direccion...');
  try {
    var resp = await fetch('/api/keyplan', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ address: address, radius: radius, api_key: apikey })
    });
    var data = await resp.json();
    if (!resp.ok || data.error) throw new Error(data.error || 'Error del servidor');
    setStatus('Generando Key Plan...');
    await new Promise(function(r){ setTimeout(r, 120); });
    lastData = data;
    renderKeyPlan(data);
  } catch(e) {
    setStatus('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generar Key Plan';
  }
}

function setStatus(msg) { document.getElementById('status-text').textContent = msg; }

function escH(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

/* ---- SVG MAP RENDERER ---- */

function renderKeyPlan(data) {
  var container = document.getElementById('keyplan');

  var W = 1160, H = 740;
  /* Target is slightly left-of-center to leave space for right-side labels */
  var TX = Math.round(W * 0.44), TY = Math.round(H * 0.50);

  var cosLat = Math.cos(data.lat * Math.PI / 180);
  /* Scale: pixels per meter. 260px covers the search radius. */
  var scale = 260.0 / data.radius;

  function proj(lat, lng) {
    return [
      TX + Math.round((lng - data.lng) * 111320 * cosLat * scale),
      TY - Math.round((lat - data.lat) * 111320 * scale)
    ];
  }

  /* Attach pixel coords to each place */
  var streets = data.streets.map(function(s) {
    return {
      name: s.name,
      places: s.places.map(function(p) {
        var xy = (p.lat && p.lng) ? proj(p.lat, p.lng) : [TX, TY];
        return { name: p.name, logo: p.logo || '', px: xy[0], py: xy[1] };
      })
    };
  });

  /* PCA: find primary direction of a set of points */
  function pcaAngle(pts) {
    var valid = pts.filter(function(p){ return Math.abs(p.px-TX)+Math.abs(p.py-TY) > 2; });
    if (valid.length < 2) {
      if (valid.length === 1) return Math.atan2(valid[0].py - TY, valid[0].px - TX);
      return 0;
    }
    var n = valid.length, mx = 0, my = 0;
    valid.forEach(function(p){ mx += p.px; my += p.py; });
    mx /= n; my /= n;
    var sxx=0, sxy=0, syy=0;
    valid.forEach(function(p){
      var dx = p.px-mx, dy = p.py-my;
      sxx += dx*dx; sxy += dx*dy; syy += dy*dy;
    });
    return 0.5 * Math.atan2(2*sxy, sxx-syy);
  }

  var BAND = 58;   /* street band height in px */
  var diag = Math.ceil(Math.sqrt(W*W + H*H)) + 40;

  var s = [];
  s.push('<svg width="'+W+'" height="'+H+'" xmlns="http://www.w3.org/2000/svg">');
  s.push('<rect width="'+W+'" height="'+H+'" fill="white"/>');

  /* Compute meta for each street */
  var metas = streets.map(function(st) {
    var n = st.places.length || 1;
    var cx = st.places.reduce(function(a,p){return a+p.px;},0)/n;
    var cy = st.places.reduce(function(a,p){return a+p.py;},0)/n;
    var ang = pcaAngle(st.places);
    return { name: st.name, places: st.places, cx: cx, cy: cy, ang: ang };
  });

  /* 1. Draw street bands */
  metas.forEach(function(m) {
    var deg = (m.ang * 180 / Math.PI).toFixed(3);
    var bx  = (m.cx - diag/2).toFixed(1);
    var by  = (m.cy - BAND/2).toFixed(1);
    /* Band */
    s.push('<rect x="'+bx+'" y="'+by+'" width="'+diag+'" height="'+BAND
      +'" fill="#6B6B6B"'
      +' transform="rotate('+deg+','+m.cx.toFixed(1)+','+m.cy.toFixed(1)+')"'
      +'/>');
    /* Street label — placed at 30% of diag from center along the band */
    var lx = (m.cx + diag * 0.28).toFixed(1);
    var ly = m.cy.toFixed(1);
    s.push('<text x="'+lx+'" y="'+ly+'"'
      +' transform="rotate('+deg+','+m.cx.toFixed(1)+','+m.cy.toFixed(1)+')"'
      +' text-anchor="middle" dominant-baseline="middle"'
      +' fill="white" font-family="Arial,sans-serif" font-size="13"'
      +' font-weight="900" letter-spacing="4">'+escH(m.name.toUpperCase())+'</text>');
  });

  /* 2. Target property: red arrow + highlighted box ON the street */
  var arrH = 30, arrW = 20;
  s.push('<polygon points="'
    +TX+','+(TY - BAND/2 - 2)+' '
    +(TX-arrW)+','+(TY - BAND/2 - 2 - arrH)+' '
    +(TX+arrW)+','+(TY - BAND/2 - 2 - arrH)
    +'" fill="#E53935"/>');
  s.push('<rect x="'+(TX-38)+'" y="'+(TY-BAND/2+2)
    +'" width="76" height="'+(BAND-4)
    +'" rx="2" fill="rgba(255,230,150,0.85)" stroke="#E53935" stroke-width="3"/>');

  /* 3. Place logos perpendicular to their street */
  var LOGO_OFF = BAND/2 + 36;   /* center-of-logo distance from band edge */
  var LOGO_H   = 58;
  var LOGO_W   = 120;

  metas.forEach(function(m) {
    var cosA = Math.cos(m.ang), sinA = Math.sin(m.ang);
    /* Perpendicular unit vector */
    var nx = -sinA, ny = cosA;

    m.places.forEach(function(p, i) {
      /* Project place onto street line */
      var relX = p.px - m.cx, relY = p.py - m.cy;
      var along = relX*cosA + relY*sinA;
      var perp  = relX*nx  + relY*ny;

      /* Determine side: use actual perpendicular sign, else alternate */
      var side = (Math.abs(perp) > 8) ? (perp >= 0 ? 1 : -1) : (i%2===0 ? 1 : -1);

      var lx = m.cx + along*cosA + side*LOGO_OFF*nx;
      var ly = m.cy + along*sinA + side*LOGO_OFF*ny;

      /* Keep within SVG bounds */
      lx = Math.max(LOGO_W/2+2, Math.min(W - LOGO_W/2 - 2, lx));
      ly = Math.max(LOGO_H/2+72, Math.min(H - LOGO_H/2 - 4, ly));

      if (p.logo) {
        /* foreignObject lets us use <img onerror> inside SVG */
        s.push('<foreignObject x="'+(lx-LOGO_W/2).toFixed(0)+'" y="'+(ly-LOGO_H/2).toFixed(0)
          +'" width="'+LOGO_W+'" height="'+LOGO_H+'">');
        s.push('<div xmlns="http://www.w3.org/1999/xhtml"'
          +' style="width:'+LOGO_W+'px;height:'+LOGO_H+'px;display:flex;'
          +'align-items:center;justify-content:center;overflow:hidden;">');
        s.push('<img src="'+escH(p.logo)+'" alt="'+escH(p.name)+'" title="'+escH(p.name)+'"'
          +' style="max-height:'+LOGO_H+'px;max-width:'+LOGO_W+'px;object-fit:contain;"'
          +' onerror="svgLogoErr(this)"/>');
        s.push('</div></foreignObject>');
      } else {
        var label = p.name.length > 18 ? p.name.slice(0,16)+'..' : p.name;
        s.push('<rect x="'+(lx-54).toFixed(0)+'" y="'+(ly-16).toFixed(0)+'" width="108" height="32"'
          +' rx="3" fill="white" stroke="#ccc" stroke-width="1"/>');
        s.push('<text x="'+lx.toFixed(0)+'" y="'+(ly+5).toFixed(0)+'" text-anchor="middle"'
          +' fill="#333" font-family="Arial,sans-serif" font-size="9.5" font-weight="700">'+escH(label)+'</text>');
      }
    });
  });

  /* 4. Header overlay */
  var parts  = data.formatted_address.split(',');
  var addrL1 = (parts[0] || '').trim().toUpperCase();
  var addrL2 = parts.slice(-2).join(',').trim().toUpperCase();

  s.push('<rect x="0" y="0" width="'+W+'" height="72" fill="rgba(255,255,255,0.95)"/>');
  s.push('<rect x="0" y="0" width="'+W+'" height="72" fill="none" stroke="#eee" stroke-width="1"/>');

  /* Gordoniz cube logo */
  s.push('<g transform="translate(14,12)">');
  s.push('<polygon points="24,2 44,12 44,26 24,36 4,26 4,12" fill="#e8f0f8"/>');
  s.push('<polygon points="24,2 44,12 24,22 4,12" fill="#2E6B9E"/>');
  s.push('<polygon points="4,12 24,22 24,36 4,26" fill="#1A3C5E"/>');
  s.push('<polygon points="44,12 24,22 24,36 44,26" fill="#3A8FCC"/>');
  s.push('</g>');
  s.push('<text x="68" y="30" font-family="Arial,sans-serif" font-size="16"'
    +' font-weight="900" fill="#1A3C5E" letter-spacing="1.5">GORDONIZ</text>');
  s.push('<text x="68" y="48" font-family="Arial,sans-serif" font-size="7.5"'
    +' fill="#888" letter-spacing="1.5">SERVICIOS </text>');
  s.push('<text x="112" y="48" font-family="Arial,sans-serif" font-size="7.5"'
    +' font-weight="700" fill="#E8A020" letter-spacing="1.5">INMOBILIARIOS</text>');

  /* KEY PLAN title — centered */
  s.push('<text x="'+(W/2)+'" y="26" text-anchor="middle" font-family="Arial,sans-serif"'
    +' font-size="15" font-weight="700" fill="#111" letter-spacing="3"'
    +' text-decoration="underline">KEY PLAN</text>');
  s.push('<text x="'+(W/2)+'" y="46" text-anchor="middle" font-family="Arial,sans-serif"'
    +' font-size="12" font-weight="600" fill="#222">'+escH(addrL1)+'</text>');
  s.push('<text x="'+(W/2)+'" y="62" text-anchor="middle" font-family="Arial,sans-serif"'
    +' font-size="10" fill="#555">'+escH(addrL2)+'</text>');

  s.push('</svg>');

  container.innerHTML = s.join('');
  document.getElementById('status').classList.remove('visible');
  document.getElementById('keyplan-container').classList.add('visible');
  document.getElementById('btn-export').style.display = 'inline-block';
  document.getElementById('btn-map').style.display = 'inline-block';
  document.getElementById('map-container').style.display = 'none';
  if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
}

/* Called by onerror inside foreignObject */
function svgLogoErr(img) {
  /* Replace with text label */
  var name = img.alt || '';
  var label = name.length > 18 ? name.slice(0,16)+'..' : name;
  var fo = img.closest ? img.closest('foreignObject') : null;
  if (!fo) { img.style.display='none'; return; }
  var svgEl = fo.closest ? fo.closest('svg') : null;
  if (!svgEl) { img.style.display='none'; return; }
  var x = parseFloat(fo.getAttribute('x')) + 54;
  var y = parseFloat(fo.getAttribute('y')) + 16;
  var rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
  rect.setAttribute('x', x - 54);
  rect.setAttribute('y', y);
  rect.setAttribute('width','108');
  rect.setAttribute('height','32');
  rect.setAttribute('rx','3');
  rect.setAttribute('fill','white');
  rect.setAttribute('stroke','#ccc');
  var txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', x);
  txt.setAttribute('y', y + 21);
  txt.setAttribute('text-anchor','middle');
  txt.setAttribute('fill','#333');
  txt.setAttribute('font-family','Arial,sans-serif');
  txt.setAttribute('font-size','9.5');
  txt.setAttribute('font-weight','700');
  txt.textContent = label;
  svgEl.appendChild(rect);
  svgEl.appendChild(txt);
  fo.style.display = 'none';
}

/* MAP */
function toggleMap() {
  var mapDiv = document.getElementById('map-container');
  var btn = document.getElementById('btn-map');
  if (mapDiv.style.display !== 'block') {
    mapDiv.style.display = 'block'; btn.textContent = 'X Cerrar Mapa'; initMap(lastData);
  } else {
    mapDiv.style.display = 'none'; btn.textContent = 'Ver Mapa';
    if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
  }
}

function initMap(data) {
  if (!data) return;
  if (window._leafletMap) { window._leafletMap.remove(); window._leafletMap = null; }
  var map = L.map('map').setView([data.lat, data.lng], 17);
  window._leafletMap = map;
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:21
  }).addTo(map);
  L.circle([data.lat, data.lng], {
    radius: data.radius, color:'#1A3C5E', fillColor:'#1A3C5E', fillOpacity:0.06, weight:2
  }).addTo(map);
  var pinHtml='<div style="background:#E8A020;color:white;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:800;border:2px solid white;">LOCAL</div>';
  L.marker([data.lat,data.lng], {
    icon: L.divIcon({className:'',html:pinHtml,iconAnchor:[30,0]}), zIndexOffset:1000
  }).addTo(map).bindPopup('<b>'+escH(data.formatted_address)+'</b>');
  data.streets.forEach(function(st) {
    st.places.forEach(function(p) {
      if (!p.lat || !p.lng) return;
      var nm = p.name.length>22 ? p.name.slice(0,20)+'..' : p.name;
      var h='<div style="background:white;border:2px solid #1A3C5E;padding:3px 8px;border-radius:16px;font-size:11px;font-weight:700;white-space:nowrap;">'+nm+'</div>';
      L.marker([p.lat,p.lng], {icon: L.divIcon({className:'',html:h,iconAnchor:[0,12]})})
        .addTo(map).bindPopup('<b>'+escH(p.name)+'</b><br><small>'+escH(p.vicinity||'')+'</small>');
    });
  });
}

document.addEventListener('keydown', function(e){ if(e.key==='Enter') generate(); });
</script>
</body>
</html>
